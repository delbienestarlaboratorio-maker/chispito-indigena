name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-sync]

permissions:
  contents: write

jobs:
  sync:
    name: Sync upstream (chispito.mx)
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/delbienestarlaboratorio-maker/Chispito.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream (keep our files on conflict)
        run: |
          git merge upstream/main --no-edit --allow-unrelated-histories -X ours || true
          # Restore our i18n-specific files that must NEVER be overwritten
          git checkout HEAD -- src/middleware.ts || true
          git checkout HEAD -- src/middleware.ts.backup || true
          git checkout HEAD -- src/app/[lang] || true
          git checkout HEAD -- src/data/diccionarios || true
          git checkout HEAD -- wrangler.toml || true
          git checkout HEAD -- open-next.config.ts || true
          git checkout HEAD -- package.json || true
          git checkout HEAD -- package-lock.json || true
          # Remove upstream-only workflow files that we don't need
          git rm -f .github/workflows/sync-downstream.yml || true
          # Restore our deploy workflow exactly as-is
          git checkout HEAD -- .github/workflows/deploy.yml || true

      - name: Commit merge result
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-sync from upstream chispito.mx (${{ github.event.client_payload.message }})"

      - name: Push
        run: git push origin main

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [sync]
    if: always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext for Cloudflare
        run: npm run pages:build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Assemble Edge Worker
        run: |
          cp .open-next/worker.js .open-next/assets/_worker.js
          cp -r .open-next/cloudflare .open-next/assets/cloudflare
          cp -r .open-next/middleware .open-next/assets/middleware
          cp -r .open-next/server-functions .open-next/assets/server-functions
          cp -r .open-next/.build .open-next/assets/.build
          echo -e "cloudflare\nmiddleware\nserver-functions\n.build" > .open-next/assets/.cfignore

      - name: Generate _routes.json
        run: |
          cat << 'EOF' > .open-next/assets/_routes.json
          {
            "version": 1,
            "include": [
              "/*"
            ],
            "exclude": [
              "/_next/*",
              "/favicon.ico",
              "/icon.svg",
              "/robots.txt",
              "/sitemap.xml"
            ]
          }
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy .open-next/assets --project-name chispito-indigena --commit-dirty=true
