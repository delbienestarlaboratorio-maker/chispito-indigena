name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-sync]

permissions:
  contents: write

jobs:
  sync:
    name: Sync upstream (chispito.mx)
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone upstream (shallow)
        run: git clone --depth 1 https://github.com/delbienestarlaboratorio-maker/Chispito.git /tmp/upstream

      - name: Selective sync - copy shared files
        run: |
          echo "=== Syncing shared data & assets ==="
          # Exercise data (715+ JSON files) — the core content
          rsync -av --delete /tmp/upstream/src/data/exercises/ src/data/exercises/
          # Content data files (curriculum, characters, etc)
          cp /tmp/upstream/src/data/content-kinder.ts src/data/content-kinder.ts || true
          cp /tmp/upstream/src/data/content-primaria.ts src/data/content-primaria.ts || true
          cp /tmp/upstream/src/data/content-primaria3.ts src/data/content-primaria3.ts || true
          cp /tmp/upstream/src/data/curriculum.ts src/data/curriculum.ts || true
          cp /tmp/upstream/src/data/personajes.ts src/data/personajes.ts || true
          cp /tmp/upstream/src/data/imagenes-materia.ts src/data/imagenes-materia.ts || true
          cp /tmp/upstream/src/data/sep-libros-map.ts src/data/sep-libros-map.ts || true
          cp /tmp/upstream/src/data/comentarios.json src/data/comentarios.json || true
          # Public assets (images, etc) — no delete to preserve our own assets
          rsync -av /tmp/upstream/public/ public/
          echo "=== Sync complete ==="

      - name: Commit synced files
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-sync from chispito.mx (${{ github.event.client_payload.message }})"

      - name: Push
        run: git push origin main

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [sync]
    if: always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext for Cloudflare
        run: npm run pages:build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Assemble Edge Worker
        run: |
          cp .open-next/worker.js .open-next/assets/_worker.js
          cp -r .open-next/cloudflare .open-next/assets/cloudflare
          cp -r .open-next/middleware .open-next/assets/middleware
          cp -r .open-next/server-functions .open-next/assets/server-functions
          cp -r .open-next/.build .open-next/assets/.build
          echo -e "cloudflare\nmiddleware\nserver-functions\n.build" > .open-next/assets/.cfignore

      - name: Generate _routes.json
        run: |
          cat << 'EOF' > .open-next/assets/_routes.json
          {
            "version": 1,
            "include": [
              "/*"
            ],
            "exclude": [
              "/_next/*",
              "/favicon.ico",
              "/icon.svg",
              "/robots.txt",
              "/sitemap.xml"
            ]
          }
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy .open-next/assets --project-name chispito-indigena --commit-dirty=true
