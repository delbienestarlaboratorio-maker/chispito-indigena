name: Deploy Next.js to Cloudflare Pages (OpenNext)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js with OpenNext
        run: npm run pages:build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-key"

      - name: Assemble Edge Worker
        run: |
          cp .open-next/worker.js .open-next/assets/_worker.js
          cp -r .open-next/cloudflare .open-next/assets/cloudflare
          cp -r .open-next/middleware .open-next/assets/middleware
          cp -r .open-next/server-functions .open-next/assets/server-functions
          cp -r .open-next/.build .open-next/assets/.build
          echo -e "cloudflare\nmiddleware\nserver-functions\n.build" > .open-next/assets/.cfignore



      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next/assets --project-name chispito-mx --branch main
