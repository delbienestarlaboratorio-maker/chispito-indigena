name: Sync to Language Subdomains

on:
  push:
    branches: [main]

jobs:
  notify-downstream:
    name: Notify downstream repos
    runs-on: ubuntu-latest
    steps:
      - name: Trigger chispito-indigena sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOWNSTREAM_SYNC_PAT }}
          repository: delbienestarlaboratorio-maker/chispito-indigena
          event-type: upstream-sync
          client-payload: '{"ref": "${{ github.sha }}", "message": "${{ github.event.head_commit.message }}"}'

      # Future: add more downstream repos here
